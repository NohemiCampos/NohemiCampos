name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: NohemiCampos
          outputs: |
            outputs: |
            dist/snake-dark.svg?color_snake=#8b0000&color_dots=#0d0d0d,#2a0a0a,#5a0f0f,#8b0000,#ff4d4d

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
